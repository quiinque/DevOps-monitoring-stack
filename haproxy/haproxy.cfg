global
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http_front
    bind *:80
    default_backend nginx_backend

backend nginx_backend
    balance roundrobin

    server nginx1 nginx1:80 check
    server nginx2 nginx2:80 check

listen stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
